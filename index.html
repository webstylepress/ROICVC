<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROI Calculator</title>

  <!-- Tailwind CSS via CDN (lightweight, no build step) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 flex items-center justify-center p-4">

  <!-- Main card -->
  <main class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-8">

    <!-- Header -->
    <h1 class="text-3xl font-bold text-slate-800 mb-1">ROI Calculator</h1>
    <p class="text-sm text-slate-500 mb-6">
      See your return on investment at a glance.
    </p>

    <!-- ============================================================ -->
    <!-- INPUT SECTION                                                  -->
    <!-- ============================================================ -->
    <section aria-label="Calculator inputs" class="space-y-5">

      <!-- Amount Invested -->
      <div>
        <label for="amount-invested" class="block text-sm font-medium text-slate-700 mb-1">
          Amount Invested ($)
        </label>
        <input
          type="number"
          id="amount-invested"
          placeholder="e.g. 10000"
          min="0"
          step="any"
          class="w-full px-4 py-2.5 border border-slate-300 rounded-lg shadow-sm
                 focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                 transition duration-150"
        />
      </div>

      <!-- Amount Returned -->
      <div>
        <label for="amount-returned" class="block text-sm font-medium text-slate-700 mb-1">
          Amount Returned ($)
        </label>
        <input
          type="number"
          id="amount-returned"
          placeholder="e.g. 15000"
          min="0"
          step="any"
          class="w-full px-4 py-2.5 border border-slate-300 rounded-lg shadow-sm
                 focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                 transition duration-150"
        />
      </div>

      <!-- Investment Time (1–10 years) -->
      <div>
        <label for="investment-years" class="block text-sm font-medium text-slate-700 mb-1">
          Investment Time (Years)
        </label>
        <select
          id="investment-years"
          class="w-full px-4 py-2.5 border border-slate-300 rounded-lg shadow-sm
                 focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                 transition duration-150 bg-white"
        >
          <option value="1">1 year</option>
          <option value="2">2 years</option>
          <option value="3">3 years</option>
          <option value="4">4 years</option>
          <option value="5">5 years</option>
          <option value="6">6 years</option>
          <option value="7">7 years</option>
          <option value="8">8 years</option>
          <option value="9">9 years</option>
          <option value="10">10 years</option>
        </select>
      </div>

      <!-- Reset button -->
      <button
        id="reset-btn"
        type="button"
        class="w-full py-2.5 px-4 bg-slate-200 hover:bg-slate-300
               text-slate-700 font-medium rounded-lg
               transition duration-150 focus:outline-none focus:ring-2 focus:ring-slate-400"
      >
        Reset
      </button>
    </section>

    <!-- ============================================================ -->
    <!-- RESULTS SECTION                                                -->
    <!-- ============================================================ -->
    <hr class="my-6 border-slate-200" />

    <section aria-label="Calculation results" class="space-y-4">

      <!-- Net Profit -->
      <div class="bg-slate-50 rounded-xl p-4 result-card">
        <p class="text-sm text-slate-500 mb-1">Net Profit</p>
        <p id="net-profit" class="text-2xl font-bold text-green-600">$0.00</p>
      </div>

      <!-- ROI Percentage -->
      <div class="bg-slate-50 rounded-xl p-4 result-card">
        <p class="text-sm text-slate-500 mb-1">ROI</p>
        <p id="roi-percent" class="text-2xl font-bold text-green-600">0.00%</p>
      </div>

      <!-- Annualized ROI (CAGR) -->
      <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 result-card">
        <p class="text-sm text-blue-500 mb-1">Annualized ROI (CAGR)</p>
        <p id="annualized-roi" class="text-2xl font-bold text-blue-700">--</p>
      </div>

      <!-- Footnote -->
      <p class="text-xs text-slate-400 pt-1">
        * Annualized ROI = Compound Annual Growth Rate over the selected period.
      </p>
    </section>
  </main>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
